<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Tangerina project illustration</title>
  <desc id="desc">Abstract chat, voice, and music assistant composition in warm neutral tones with amber accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f5ef" />
      <stop offset="100%" stop-color="#eee7dc" />
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
